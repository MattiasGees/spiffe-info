<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SPIFFE Workload Identity</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pan-navy:    #003A6E;
    --pan-navy-d:  #00274E;
    --pan-navy-l:  #004F9A;
    --pan-orange:  #FA4616;
    --pan-orange-l:#FF6B3D;
    --pan-blue:    #009FDF;
    --pan-green:   #00C389;
    --pan-yellow:  #FFB900;
    --bg:          #F0F4F8;
    --bg-card:     #FFFFFF;
    --border:      #D8E2EE;
    --text:        #0D1F33;
    --text-2:      #4A6080;
    --text-3:      #8AA0BC;
    --mono:        'JetBrains Mono', monospace;
    --sans:        'Plus Jakarta Sans', sans-serif;
    --radius:      10px;
    --shadow:      0 2px 12px rgba(0,58,110,0.10);
    --shadow-lg:   0 8px 40px rgba(0,58,110,0.16);
  }
  html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); }
  #root { height: 100%; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .mono { font-family: var(--mono); }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header {
    background: linear-gradient(135deg, var(--pan-navy-d) 0%, var(--pan-navy) 60%, var(--pan-navy-l) 100%);
    padding: 0 32px;
    display: flex; align-items: center; gap: 20px;
    height: 64px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    position: relative; z-index: 10;
  }
  .header-logo { display: flex; align-items: center; flex-shrink: 0; background: #fff; border-radius: 7px; padding: 1px 4px; }
  .header-logo img { height: 50px; width: auto; display: block; }
  .header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); margin: 0 4px; }
  .header-title { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .header-spacer { flex: 1; }
  .header-status { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.7); font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pan-green); box-shadow: 0 0 0 2px rgba(0,195,137,0.3); }
  .status-dot.loading { background: var(--pan-yellow); box-shadow: 0 0 0 2px rgba(255,185,0,0.3); }
  .status-dot.error { background: var(--pan-orange); box-shadow: 0 0 0 2px rgba(250,70,22,0.3); }
  .workload-bar { background: var(--pan-navy-d); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 32px; display: flex; align-items: center; gap: 24px; }
  .workload-id { font-family: var(--mono); font-size: 13px; color: var(--pan-blue); }
  .workload-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.35); }
  .workload-sep { color: rgba(255,255,255,0.15); }
  .tabs-bar { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 0; }
  .tab-btn { background: none; border: none; cursor: pointer; font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--text-2); padding: 16px 20px 14px; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 8px; transition: color 0.15s, border-color 0.15s; position: relative; top: 1px; white-space: nowrap; }
  .tab-btn:hover { color: var(--pan-navy); }
  .tab-btn.active { color: var(--pan-navy); border-bottom-color: var(--pan-orange); }
  .tab-icon { width: 16px; height: 16px; opacity: 0.7; }
  .tab-btn.active .tab-icon { opacity: 1; }
  .main { flex: 1; padding: 28px 32px; overflow-y: auto; }
  .section-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .section-sub { font-size: 13px; color: var(--text-2); margin-top: 4px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
  .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #F7FAFD; }
  .card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-2); }
  .card-body { padding: 20px; }
  .field-grid { display: grid; grid-template-columns: 200px 1fr; gap: 0; }
  .field-row { display: contents; }
  .field-row > * { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .field-row:last-child > * { border-bottom: none; }
  .field-label { color: var(--text-2); font-weight: 600; font-size: 12.5px; display: flex; align-items: center; background: #F7FAFD; }
  .field-value { color: var(--text); font-family: var(--mono); font-size: 12.5px; word-break: break-all; display: flex; align-items: center; gap: 8px; }
  .field-value.plain { font-family: var(--sans); font-size: 13px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11.5px; font-weight: 600; font-family: var(--sans); }
  .badge-green { background: rgba(0,195,137,0.12); color: #008F65; }
  .badge-blue  { background: rgba(0,159,223,0.12); color: #0078AB; }
  .badge-orange{ background: rgba(250,70,22,0.10);  color: #C73000; }
  .badge-navy  { background: rgba(0,58,110,0.10);   color: var(--pan-navy); }
  .token-box { background: #0D1F33; border-radius: 8px; padding: 16px 20px; font-family: var(--mono); font-size: 12px; color: #A8C7E8; word-break: break-all; line-height: 1.7; position: relative; }
  .token-part-h { color: #FFB900; }
  .token-part-p { color: #00C389; }
  .token-part-s { color: #FF6B8A; }
  .token-dot    { color: #4A6080; }
  .claims-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .claim-item { background: #F7FAFD; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .claim-key { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-3); margin-bottom: 4px; }
  .claim-val { font-family: var(--mono); font-size: 13px; color: var(--text); word-break: break-all; }
  .claim-val.spiffe { color: var(--pan-blue); }
  .claim-val.time { color: var(--pan-green); }
  .btn-copy { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-family: var(--sans); font-weight: 600; color: var(--text-2); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; flex-shrink: 0; }
  .btn-copy:hover { background: var(--bg); color: var(--text); border-color: var(--text-3); }
  .btn-copy.copied { background: rgba(0,195,137,0.1); color: #008F65; border-color: #00C389; }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--pan-navy); color: #fff; }
  .btn-primary:hover { background: var(--pan-navy-l); }
  .btn-outline { background: #fff; color: var(--pan-navy); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg); border-color: var(--pan-navy); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .trust-table { width: 100%; border-collapse: collapse; }
  .trust-table th { text-align: left; padding: 10px 16px; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-2); background: #F7FAFD; border-bottom: 1px solid var(--border); }
  .trust-table td { padding: 13px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .trust-table tr:last-child td { border-bottom: none; }
  .trust-table tr:hover td { background: #F7FAFD; }
  .cert-subject { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .cert-serial { font-family: var(--mono); font-size: 12px; color: var(--text-2); }
  .cert-actions { display: flex; gap: 8px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,20,50,0.55); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal { background: var(--bg-card); border-radius: 14px; box-shadow: var(--shadow-lg); width: 100%; max-width: 720px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; font-family: var(--mono); }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-2); font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; transition: all 0.1s; }
  .modal-close:hover { background: var(--bg); color: var(--text); }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; gap: 10px; background: #F7FAFD; }
  .pem-box { background: #0D1F33; border-radius: 8px; padding: 16px 18px; font-family: var(--mono); font-size: 11.5px; color: #8CB8E0; white-space: pre-wrap; word-break: break-all; line-height: 1.6; max-height: 220px; overflow-y: auto; margin-top: 16px; }
  .validity-bar { display: flex; flex-direction: column; gap: 4px; }
  .validity-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .validity-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .validity-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); }
  .fingerprint { font-family: var(--mono); font-size: 11px; color: var(--text-2); word-break: break-all; }
  .empty { text-align: center; padding: 48px 24px; color: var(--text-2); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-msg { font-size: 15px; font-weight: 600; }
  .empty-sub { font-size: 13px; margin-top: 6px; }
  .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); border-radius: 7px; color: rgba(255,255,255,0.85); font-size: 12.5px; font-weight: 600; font-family: var(--sans); cursor: pointer; transition: all 0.15s; }
  .refresh-btn:hover { background: rgba(255,255,255,0.2); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.8s linear infinite; }
  @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
  .skeleton { background: linear-gradient(90deg, #e8edf3 25%, #f3f6f9 50%, #e8edf3 75%); background-size: 400px 100%; animation: shimmer 1.2s infinite; border-radius: 4px; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }
  .fade-in { animation: fadeUp 0.3s ease both; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
  .error-banner { background: rgba(250,70,22,0.08); border: 1px solid rgba(250,70,22,0.25); border-radius: 8px; padding: 16px 20px; color: #C73000; font-size: 13px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Utilities ─────────────────────────────────────────────────────────────────

function formatDate(iso) {
  return new Date(iso).toLocaleString("en-US", {
    year: "numeric", month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", timeZoneName: "short"
  });
}

function unixToDate(unix) {
  return new Date(unix * 1000).toLocaleString("en-US", {
    year: "numeric", month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", timeZoneName: "short"
  });
}

function validityPercent(notBefore, notAfter) {
  const start = new Date(notBefore).getTime();
  const end   = new Date(notAfter).getTime();
  const now   = Date.now();
  return Math.max(0, Math.min(100, ((now - start) / (end - start)) * 100));
}

function timeRemaining(notAfter) {
  const ms = new Date(notAfter).getTime() - Date.now();
  if (ms < 0) return { label: "Expired", ok: false };
  const h = Math.floor(ms / 3600000);
  const d = Math.floor(h / 24);
  if (d > 1) return { label: `${d} days remaining`, ok: true };
  if (h > 1) return { label: `${h} hours remaining`, ok: h > 2 };
  return { label: "< 1 hour remaining", ok: false };
}

function splitJWT(token) {
  const parts = (token || "").split(".");
  return { header: parts[0] || "", payload: parts[1] || "", signature: parts[2] || "" };
}

function extractTrustDomain(spiffeId) {
  if (!spiffeId) return "—";
  return spiffeId.replace("spiffe://", "").split("/")[0];
}

// ─── Copy Button ───────────────────────────────────────────────────────────────

function CopyBtn({ text, label = "Copy" }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <button className={`btn-copy${copied ? " copied" : ""}`} onClick={copy}>
      {copied
        ? <><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 3L6 10.5 2.5 7 1 8.5l5 5 9-9z"/></svg> Copied</>
        : <><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 4h8v1H4zm0 2h8v1H4zm0 2h6v1H4zM2 2v12h10v-2h2V2H2zm9 11H3V3h8v10zm2-2h-1V4h-1V2h2v9z"/></svg> {label}</>
      }
    </button>
  );
}

// ─── Error Banner ──────────────────────────────────────────────────────────────

function ErrorBanner({ message }) {
  return (
    <div className="error-banner">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm-.75 4h1.5v4h-1.5V5zm0 5h1.5v1.5h-1.5V10z"/>
      </svg>
      <span>{message}</span>
    </div>
  );
}

// ─── JWT SVID Tab ──────────────────────────────────────────────────────────────

function JwtSvidTab({ data, error }) {
  if (error) return <ErrorBanner message={error} />;
  if (!data) return null;

  const { header, payload, signature } = splitJWT(data.token);
  const { claims } = data;
  const notBefore = claims.iat ? new Date(claims.iat * 1000).toISOString() : new Date().toISOString();
  const notAfter  = claims.exp ? new Date(claims.exp * 1000).toISOString() : new Date().toISOString();
  const remaining = timeRemaining(notAfter);
  const pct = validityPercent(notBefore, notAfter);
  const audience = Array.isArray(data.audience) ? data.audience : [data.audience].filter(Boolean);

  return (
    <div className="fade-in">
      <div className="section-header">
        <div>
          <div className="section-title">JWT-SVID</div>
          <div className="section-sub">JSON Web Token – SPIFFE Verifiable Identity Document</div>
        </div>
        <span className={`badge ${remaining.ok ? "badge-green" : "badge-orange"}`}>● {remaining.label}</span>
      </div>

      <div className="card">
        <div className="card-header"><span className="card-title">Token Validity</span></div>
        <div className="card-body">
          <div className="validity-bar">
            <div className="validity-track">
              <div className="validity-fill" style={{ width: `${pct}%`, background: remaining.ok ? "var(--pan-green)" : "var(--pan-orange)" }}></div>
            </div>
            <div className="validity-labels">
              <span>{claims.iat ? unixToDate(claims.iat) : "—"}</span>
              <span style={{ color: remaining.ok ? "var(--pan-green)" : "var(--pan-orange)", fontWeight: 600 }}>{pct.toFixed(1)}% elapsed</span>
              <span>{claims.exp ? unixToDate(claims.exp) : "—"}</span>
            </div>
          </div>
        </div>
      </div>

      <div className="two-col">
        <div className="card">
          <div className="card-header"><span className="card-title">Identity Claims</span></div>
          <div className="card-body" style={{ padding: 0 }}>
            <div className="field-grid">
              <div className="field-row">
                <div className="field-label">Subject (sub)</div>
                <div className="field-value" style={{ color: "var(--pan-blue)" }}>{claims.sub || "—"}</div>
              </div>
              <div className="field-row">
                <div className="field-label">Issuer (iss)</div>
                <div className="field-value" style={{ color: "var(--pan-blue)" }}>{claims.iss || "—"}</div>
              </div>
              <div className="field-row">
                <div className="field-label">Audience (aud)</div>
                <div className="field-value" style={{ flexDirection: "column", alignItems: "flex-start", gap: 3 }}>
                  {audience.map(a => <span key={a} className="badge badge-blue" style={{ fontFamily: "var(--mono)", fontWeight: 500 }}>{a}</span>)}
                </div>
              </div>
              <div className="field-row">
                <div className="field-label">JWT ID (jti)</div>
                <div className="field-value" style={{ fontSize: 11.5 }}>{claims.jti || "—"}</div>
              </div>
              <div className="field-row">
                <div className="field-label">Hint</div>
                <div className="field-value plain">{data.hint || <span style={{ color: "var(--text-3)" }}>—</span>}</div>
              </div>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Token &amp; Timing</span></div>
          <div className="card-body" style={{ padding: 0 }}>
            <div className="field-grid">
              <div className="field-row">
                <div className="field-label">Algorithm</div>
                <div className="field-value"><span className="badge badge-navy">{data.algorithm || "—"}</span></div>
              </div>
              <div className="field-row">
                <div className="field-label">Key ID</div>
                <div className="field-value">{data.keyId || "—"}</div>
              </div>
              <div className="field-row">
                <div className="field-label">Type</div>
                <div className="field-value">JWT</div>
              </div>
              <div className="field-row">
                <div className="field-label">Issued At (iat)</div>
                <div className="field-value" style={{ flexDirection: "column", alignItems: "flex-start", gap: 1 }}>
                  {claims.iat ? <><span style={{ color: "var(--pan-green)" }}>{unixToDate(claims.iat)}</span><span style={{ color: "var(--text-3)", fontSize: 11 }}>unix: {claims.iat}</span></> : "—"}
                </div>
              </div>
              <div className="field-row">
                <div className="field-label">Expires At (exp)</div>
                <div className="field-value" style={{ flexDirection: "column", alignItems: "flex-start", gap: 1 }}>
                  {claims.exp ? <><span style={{ color: remaining.ok ? "var(--pan-green)" : "var(--pan-orange)" }}>{unixToDate(claims.exp)}</span><span style={{ color: "var(--text-3)", fontSize: 11 }}>unix: {claims.exp}</span></> : "—"}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">Raw JWT Token</span>
          <CopyBtn text={data.token} />
        </div>
        <div className="card-body">
          <div className="token-box">
            <span className="token-part-h">{header}</span>
            <span className="token-dot">.</span>
            <span className="token-part-p">{payload}</span>
            <span className="token-dot">.</span>
            <span className="token-part-s">{signature}</span>
          </div>
          <div style={{ marginTop: 10, display: "flex", gap: 16, fontSize: 12, color: "var(--text-2)" }}>
            {[["#FFB900","Header"],["#00C389","Payload"],["#FF6B8A","Signature"]].map(([c,l]) => (
              <span key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ display: "inline-block", width: 10, height: 10, background: c, borderRadius: 2 }}></span>{l}
              </span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── X509 SVID Tab ─────────────────────────────────────────────────────────────

function X509SvidTab({ data, error }) {
  if (error) return <ErrorBanner message={error} />;
  if (!data) return null;

  const pct = validityPercent(data.notBefore, data.notAfter);
  const remaining = timeRemaining(data.notAfter);

  const downloadPEM = () => {
    const blob = new Blob([data.pem], { type: "application/x-pem-file" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "x509-svid.pem"; a.click();
  };

  return (
    <div className="fade-in">
      <div className="section-header">
        <div>
          <div className="section-title">X.509-SVID</div>
          <div className="section-sub">X.509 Certificate – SPIFFE Verifiable Identity Document</div>
        </div>
        <span className={`badge ${remaining.ok ? "badge-green" : "badge-orange"}`}>● {remaining.label}</span>
      </div>

      <div className="card">
        <div className="card-header"><span className="card-title">Certificate Validity</span></div>
        <div className="card-body">
          <div className="validity-bar">
            <div className="validity-track">
              <div className="validity-fill" style={{ width: `${pct}%`, background: remaining.ok ? "var(--pan-green)" : "var(--pan-orange)" }}></div>
            </div>
            <div className="validity-labels">
              <span>{formatDate(data.notBefore)}</span>
              <span style={{ color: remaining.ok ? "var(--pan-green)" : "var(--pan-orange)", fontWeight: 600 }}>{pct.toFixed(1)}% elapsed</span>
              <span>{formatDate(data.notAfter)}</span>
            </div>
          </div>
        </div>
      </div>

      <div className="two-col">
        <div className="card">
          <div className="card-header"><span className="card-title">Identity</span></div>
          <div className="card-body" style={{ padding: 0 }}>
            <div className="field-grid">
              <div className="field-row">
                <div className="field-label">SPIFFE ID</div>
                <div className="field-value" style={{ color: "var(--pan-blue)" }}>{data.spiffeId}</div>
              </div>
              <div className="field-row">
                <div className="field-label">Subject</div>
                <div className="field-value" style={{ fontSize: 11.5 }}>{data.subject}</div>
              </div>
              <div className="field-row">
                <div className="field-label">Issuer</div>
                <div className="field-value" style={{ fontSize: 11.5 }}>{data.issuer}</div>
              </div>
              <div className="field-row">
                <div className="field-label">Serial Number</div>
                <div className="field-value" style={{ fontSize: 11 }}>{data.serialNumber}</div>
              </div>
              <div className="field-row">
                <div className="field-label">Is CA</div>
                <div className="field-value"><span className={`badge ${data.isCA ? "badge-orange" : "badge-green"}`}>{data.isCA ? "Yes" : "No"}</span></div>
              </div>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Algorithms &amp; Usage</span></div>
          <div className="card-body" style={{ padding: 0 }}>
            <div className="field-grid">
              <div className="field-row">
                <div className="field-label">Key Algorithm</div>
                <div className="field-value"><span className="badge badge-navy">{data.keyAlgorithm}</span></div>
              </div>
              <div className="field-row">
                <div className="field-label">Signature Alg.</div>
                <div className="field-value"><span className="badge badge-navy">{data.signatureAlgorithm}</span></div>
              </div>
              <div className="field-row">
                <div className="field-label">Key Usage</div>
                <div className="field-value" style={{ flexDirection: "column", alignItems: "flex-start", gap: 3 }}>
                  {(data.keyUsage || []).map(u => <span key={u} className="badge badge-blue">{u}</span>)}
                </div>
              </div>
              <div className="field-row">
                <div className="field-label">Ext. Key Usage</div>
                <div className="field-value" style={{ flexDirection: "column", alignItems: "flex-start", gap: 3 }}>
                  {(data.extKeyUsage || []).map(u => <span key={u} className="badge badge-green">{u}</span>)}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><span className="card-title">Subject Alternative Names</span></div>
        <div className="card-body">
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {(data.subjectAltNames || []).map(san => (
              <span key={san} style={{ background: "rgba(0,79,154,0.08)", border: "1px solid rgba(0,79,154,0.2)", borderRadius: 6, padding: "5px 12px", fontFamily: "var(--mono)", fontSize: 13, color: "var(--pan-navy)" }}>{san}</span>
            ))}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">Fingerprint &amp; Certificate</span>
          <div style={{ display: "flex", gap: 8 }}>
            <CopyBtn text={data.pem} label="Copy PEM" />
            <button className="btn btn-outline btn-sm" onClick={downloadPEM}>
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v-1H3v1z"/></svg>
              Download PEM
            </button>
          </div>
        </div>
        <div className="card-body">
          <div style={{ fontSize: 12.5, color: "var(--text-2)", marginBottom: 8, fontWeight: 600 }}>SHA-256 Fingerprint</div>
          <div className="fingerprint">{data.fingerprint}</div>
          <div className="pem-box">{data.pem}</div>
        </div>
      </div>
    </div>
  );
}

// ─── Certificate Detail Modal ──────────────────────────────────────────────────

function CertModal({ cert, onClose }) {
  const pct = validityPercent(cert.notBefore, cert.notAfter);
  const remaining = timeRemaining(cert.notAfter);
  const downloadPem = () => {
    const blob = new Blob([cert.pem], { type: "application/x-pem-file" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `${cert.trustDomain}-${cert.id}.pem`; a.click();
  };
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal fade-in">
        <div className="modal-header">
          <div>
            <div className="modal-title">Certificate Details</div>
            <div className="modal-sub">{cert.subject}</div>
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.8px", color: "var(--text-2)", marginBottom: 8 }}>Validity Period</div>
            <div className="validity-bar">
              <div className="validity-track">
                <div className="validity-fill" style={{ width: `${pct}%`, background: remaining.ok ? "var(--pan-green)" : "var(--pan-orange)" }}></div>
              </div>
              <div className="validity-labels">
                <span>{formatDate(cert.notBefore)}</span>
                <span className={`badge ${remaining.ok ? "badge-green" : "badge-orange"}`} style={{ fontSize: 11 }}>{remaining.label}</span>
                <span>{formatDate(cert.notAfter)}</span>
              </div>
            </div>
          </div>
          <div className="field-grid">
            {[
              ["Trust Domain", cert.trustDomain, "plain"],
              ["Subject", cert.subject, ""],
              ["Issuer", cert.issuer, ""],
              ["Serial Number", cert.serialNumber, ""],
            ].map(([label, val, cls]) => (
              <div className="field-row" key={label}>
                <div className="field-label">{label}</div>
                <div className={`field-value ${cls}`} style={{ fontSize: 11.5 }}>{val}</div>
              </div>
            ))}
            <div className="field-row">
              <div className="field-label">Key Algorithm</div>
              <div className="field-value"><span className="badge badge-navy">{cert.keyAlgorithm}</span></div>
            </div>
            <div className="field-row">
              <div className="field-label">Signature Alg.</div>
              <div className="field-value"><span className="badge badge-navy">{cert.signatureAlgorithm}</span></div>
            </div>
            <div className="field-row">
              <div className="field-label">Is CA</div>
              <div className="field-value"><span className={`badge ${cert.isCA ? "badge-orange" : "badge-green"}`}>{cert.isCA ? "Yes (CA Certificate)" : "No"}</span></div>
            </div>
            <div className="field-row">
              <div className="field-label">Fingerprint</div>
              <div className="field-value" style={{ fontSize: 10.5, wordBreak: "break-all" }}>{cert.fingerprint}</div>
            </div>
          </div>
          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.8px", color: "var(--text-2)", marginBottom: 4 }}>PEM Certificate</div>
            <div className="pem-box">{cert.pem}</div>
          </div>
        </div>
        <div className="modal-footer">
          <CopyBtn text={cert.pem} label="Copy PEM" />
          <button className="btn btn-primary btn-sm" onClick={downloadPem}>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v-1H3v1z"/></svg>
            Download PEM
          </button>
          <button className="btn btn-outline btn-sm" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ─── Trust Bundles Tab ─────────────────────────────────────────────────────────

function TrustBundlesTab({ bundles, error }) {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState("");

  if (error) return <ErrorBanner message={error} />;

  const filtered = (bundles || []).filter(b =>
    b.subject.toLowerCase().includes(filter.toLowerCase()) ||
    b.trustDomain.toLowerCase().includes(filter.toLowerCase())
  );
  const domains = [...new Set(filtered.map(b => b.trustDomain))];

  const downloadPem = (cert, e) => {
    e.stopPropagation();
    const blob = new Blob([cert.pem], { type: "application/x-pem-file" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `${cert.trustDomain}-${cert.id}.pem`; a.click();
  };

  return (
    <div className="fade-in">
      <div className="section-header">
        <div>
          <div className="section-title">X.509 Trust Bundles</div>
          <div className="section-sub">{(bundles || []).length} certificates across {[...new Set((bundles || []).map(b => b.trustDomain))].length} trust domains</div>
        </div>
        <input type="text" placeholder="Filter certificates…" value={filter} onChange={e => setFilter(e.target.value)}
          style={{ padding: "7px 12px", border: "1px solid var(--border)", borderRadius: 7, fontSize: 13, fontFamily: "var(--sans)", width: 220, color: "var(--text)", outline: "none", background: "var(--bg-card)" }} />
      </div>

      {domains.map(domain => {
        const certs = filtered.filter(b => b.trustDomain === domain);
        return (
          <div key={domain} className="card" style={{ marginBottom: 20 }}>
            <div className="card-header">
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span className="card-title">Trust Domain</span>
                <span style={{ fontFamily: "var(--mono)", fontSize: 13, fontWeight: 600, color: "var(--pan-navy)", background: "rgba(0,58,110,0.08)", padding: "2px 10px", borderRadius: 5 }}>{domain}</span>
                <span className="badge badge-blue">{certs.length} cert{certs.length !== 1 ? "s" : ""}</span>
              </div>
            </div>
            <div style={{ overflowX: "auto" }}>
              <table className="trust-table">
                <thead>
                  <tr>
                    <th>Subject</th><th>Serial Number</th><th>Key Algorithm</th><th>Valid Until</th><th>Status</th><th style={{ textAlign: "right" }}>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {certs.map(cert => {
                    const rem = timeRemaining(cert.notAfter);
                    return (
                      <tr key={cert.id}>
                        <td>
                          <div className="cert-subject">{cert.subject.split(",")[0].replace("CN=","")}</div>
                          <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 2 }}>{cert.subject}</div>
                        </td>
                        <td><span className="cert-serial">{cert.serialNumber}</span></td>
                        <td><span className="badge badge-navy">{cert.keyAlgorithm}</span></td>
                        <td><div style={{ fontSize: 12.5 }}>{formatDate(cert.notAfter)}</div></td>
                        <td><span className={`badge ${rem.ok ? "badge-green" : "badge-orange"}`}>● {rem.ok ? "Valid" : "Expiring"}</span></td>
                        <td>
                          <div className="cert-actions" style={{ justifyContent: "flex-end" }}>
                            <button className="btn btn-outline btn-sm" onClick={() => setSelected(cert)}>
                              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3C4 3 1 8 1 8s3 5 7 5 7-5 7-5-3-5-7-5zm0 8a3 3 0 110-6 3 3 0 010 6zm0-5a2 2 0 100 4 2 2 0 000-4z"/></svg>
                              Details
                            </button>
                            <button className="btn btn-primary btn-sm" onClick={e => downloadPem(cert, e)}>
                              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v-1H3v1z"/></svg>
                              PEM
                            </button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}

      {filtered.length === 0 && !error && (
        <div className="empty">
          <div className="empty-icon">🔍</div>
          <div className="empty-msg">{filter ? "No certificates match your filter" : "No trust bundles available"}</div>
          <div className="empty-sub">{filter ? "Try a different search term" : "Waiting for workload API connection"}</div>
        </div>
      )}

      {selected && <CertModal cert={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState("jwt");
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [jwtData, setJwtData] = useState(null);
  const [x509Data, setX509Data] = useState(null);
  const [bundles, setBundles] = useState([]);
  const [errors, setErrors] = useState({});

  const fetchAll = useCallback(async () => {
    setLoading(true);
    setErrors({});

    const results = await Promise.allSettled([
      fetch("/api/jwt-svid").then(r => { if (!r.ok) throw new Error(r.status === 503 ? "Workload API not yet connected" : `HTTP ${r.status}`); return r.json(); }),
      fetch("/api/x509-svid").then(r => { if (!r.ok) throw new Error(r.status === 503 ? "Workload API not yet connected" : `HTTP ${r.status}`); return r.json(); }),
      fetch("/api/trust-bundles").then(r => { if (!r.ok) throw new Error(r.status === 503 ? "Workload API not yet connected" : `HTTP ${r.status}`); return r.json(); }),
    ]);

    const [jwtRes, x509Res, bundlesRes] = results;
    const newErrors = {};

    if (jwtRes.status === "fulfilled") setJwtData(jwtRes.value);
    else newErrors.jwt = jwtRes.reason.message;

    if (x509Res.status === "fulfilled") setX509Data(x509Res.value);
    else newErrors.x509 = x509Res.reason.message;

    if (bundlesRes.status === "fulfilled") setBundles(bundlesRes.value);
    else newErrors.bundles = bundlesRes.reason.message;

    setErrors(newErrors);
    setLoading(false);
    setRefreshing(false);
  }, []);

  useEffect(() => { fetchAll(); }, [fetchAll]);

  const refresh = () => { setRefreshing(true); fetchAll(); };

  const spiffeId = x509Data?.spiffeId || "—";
  const trustDomain = x509Data ? extractTrustDomain(x509Data.spiffeId) : "—";
  const connected = !loading && Object.keys(errors).length < 3;
  const statusLabel = loading ? "Fetching…" : connected ? "Workload API Connected" : "Workload API Unavailable";
  const statusClass = loading ? "loading" : connected ? "" : "error";

  const tabs = [
    { id: "jwt",     label: "JWT-SVID",     icon: <svg className="tab-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zM2 8a6 6 0 1112 0A6 6 0 012 8zm5-2h2v5H7V6zm0-2h2v1.5H7V4z"/></svg> },
    { id: "x509",    label: "X.509-SVID",   icon: <svg className="tab-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L2 4v4c0 3.5 2.5 6.5 6 7.4C11.5 14.5 14 11.5 14 8V4L8 1zm-1 9.4L4.6 8l1.1-1.1 1.3 1.3 3.3-3.3 1.1 1.1L7 10.4z"/></svg> },
    { id: "bundles", label: "Trust Bundles", icon: <svg className="tab-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v1H2zm0 3h12v1H2zm0 3h8v1H2zm0 3h6v1H2z"/></svg> },
  ];

  return (
    <div className="app">
      <header className="header">
        <div className="header-logo">
          <img src="/uploads/spiffe-logo.svg" alt="SPIFFE" />
        </div>
        <div className="header-divider"></div>
        <span className="header-title">SPIFFE Workload Identity</span>
        <div className="header-spacer"></div>
        <div className="header-status">
          <div className={`status-dot ${statusClass}`}></div>
          <span>{statusLabel}</span>
        </div>
        <button className="refresh-btn" onClick={refresh} disabled={refreshing || loading}>
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" className={refreshing ? "spinning" : ""}>
            <path d="M14 8A6 6 0 112.1 5H4.5L2 2.5 4.5 0H1v2.5A8 8 0 1014 8z"/>
          </svg>
          Refresh
        </button>
      </header>

      <div className="workload-bar">
        <span className="workload-label">SPIFFE ID</span>
        <span className="workload-sep">|</span>
        <span className="workload-id">{spiffeId}</span>
        <span className="workload-sep">|</span>
        <span className="workload-label">Trust Domain</span>
        <span className="workload-sep">|</span>
        <span className="workload-id" style={{ color: "rgba(255,255,255,0.6)" }}>{trustDomain}</span>
      </div>

      <nav className="tabs-bar">
        {tabs.map(t => (
          <button key={t.id} className={`tab-btn${tab === t.id ? " active" : ""}`} onClick={() => setTab(t.id)}>
            {t.icon}{t.label}
          </button>
        ))}
      </nav>

      <main className="main">
        {loading ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {[200,120,80,160].map((h,i) => <div key={i} className="skeleton" style={{ height: h, borderRadius: 10 }}></div>)}
          </div>
        ) : (
          <>
            {tab === "jwt"     && <JwtSvidTab     data={jwtData}  error={errors.jwt} />}
            {tab === "x509"    && <X509SvidTab    data={x509Data} error={errors.x509} />}
            {tab === "bundles" && <TrustBundlesTab bundles={bundles} error={errors.bundles} />}
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
