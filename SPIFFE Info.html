<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pan-navy:    #003A6E;
    --pan-navy-d:  #00274E;
    --pan-navy-l:  #004F9A;
    --pan-orange:  #FA4616;
    --pan-orange-l:#FF6B3D;
    --pan-blue:    #009FDF;
    --pan-green:   #00C389;
    --pan-yellow:  #FFB900;
    --bg:          #F0F4F8;
    --bg-card:     #FFFFFF;
    --border:      #D8E2EE;
    --text:        #0D1F33;
    --text-2:      #4A6080;
    --text-3:      #8AA0BC;
    --mono:        'JetBrains Mono', monospace;
    --sans:        'Plus Jakarta Sans', sans-serif;
    --radius:      10px;
    --shadow:      0 2px 12px rgba(0,58,110,0.10);
    --shadow-lg:   0 8px 40px rgba(0,58,110,0.16);
  }
  html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); }
  #root { height: 100%; display: flex; flex-direction: column; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* typography */
  .mono { font-family: var(--mono); }

  /* layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* header */
  .header {
    background: linear-gradient(135deg, var(--pan-navy-d) 0%, var(--pan-navy) 60%, var(--pan-navy-l) 100%);
    padding: 0 32px;
    display: flex; align-items: center; gap: 20px;
    height: 64px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    position: relative; z-index: 10;
  }
  .header-logo {
    display: flex; align-items: center; flex-shrink: 0;
    background: #fff;
    border-radius: 7px;
    padding: 1px 4px;
  }
  .header-logo img { height: 50px; width: auto; display: block; }
  .header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); margin: 0 4px; }
  .header-title { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .header-spacer { flex: 1; }
  .header-status { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.7); font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pan-green); box-shadow: 0 0 0 2px rgba(0,195,137,0.3); }
  .status-dot.error { background: var(--pan-orange); box-shadow: 0 0 0 2px rgba(250,70,22,0.3); }

  /* workload bar */
  .workload-bar {
    background: var(--pan-navy-d);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 10px 32px;
    display: flex; align-items: center; gap: 24px;
  }
  .workload-id { font-family: var(--mono); font-size: 13px; color: var(--pan-blue); letter-spacing: 0; }
  .workload-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.35); }
  .workload-sep { color: rgba(255,255,255,0.15); }

  /* tabs */
  .tabs-bar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; gap: 0;
  }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 14px; font-weight: 600;
    color: var(--text-2);
    padding: 16px 20px 14px;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; gap: 8px;
    transition: color 0.15s, border-color 0.15s;
    position: relative; top: 1px;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--pan-navy); }
  .tab-btn.active { color: var(--pan-navy); border-bottom-color: var(--pan-orange); }
  .tab-icon { width: 16px; height: 16px; opacity: 0.7; }
  .tab-btn.active .tab-icon { opacity: 1; }

  /* main content */
  .main { flex: 1; padding: 28px 32px; overflow-y: auto; }

  /* section header */
  .section-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .section-sub { font-size: 13px; color: var(--text-2); margin-top: 4px; }

  /* card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: #F7FAFD;
  }
  .card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-2); }
  .card-body { padding: 20px; }

  /* field grid */
  .field-grid { display: grid; grid-template-columns: 200px 1fr; gap: 0; }
  .field-row {
    display: contents;
  }
  .field-row > * {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
  }
  .field-row:last-child > * { border-bottom: none; }
  .field-label { color: var(--text-2); font-weight: 600; font-size: 12.5px; display: flex; align-items: center; background: #F7FAFD; }
  .field-value { color: var(--text); font-family: var(--mono); font-size: 12.5px; word-break: break-all; display: flex; align-items: center; gap: 8px; }
  .field-value.plain { font-family: var(--sans); font-size: 13px; }

  /* badge */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px;
    font-size: 11.5px; font-weight: 600;
    font-family: var(--sans);
  }
  .badge-green { background: rgba(0,195,137,0.12); color: #008F65; }
  .badge-blue  { background: rgba(0,159,223,0.12); color: #0078AB; }
  .badge-orange{ background: rgba(250,70,22,0.10); color: #C73000; }
  .badge-navy  { background: rgba(0,58,110,0.10);  color: var(--pan-navy); }

  /* token display */
  .token-box {
    background: #0D1F33;
    border-radius: 8px;
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: #A8C7E8;
    word-break: break-all;
    line-height: 1.7;
    position: relative;
  }
  .token-part-h { color: #FFB900; }
  .token-part-p { color: #00C389; }
  .token-part-s { color: #FF6B8A; }
  .token-dot    { color: #4A6080; }

  /* claims grid */
  .claims-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .claim-item {
    background: #F7FAFD;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .claim-key { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-3); margin-bottom: 4px; }
  .claim-val { font-family: var(--mono); font-size: 13px; color: var(--text); word-break: break-all; }
  .claim-val.spiffe { color: var(--pan-blue); }
  .claim-val.time { color: var(--pan-green); }

  /* copy btn */
  .btn-copy {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-size: 12px; font-family: var(--sans); font-weight: 600;
    color: var(--text-2); cursor: pointer; display: flex; align-items: center; gap: 5px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-copy:hover { background: var(--bg); color: var(--text); border-color: var(--text-3); }
  .btn-copy.copied { background: rgba(0,195,137,0.1); color: #008F65; border-color: #00C389; }

  /* action button */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 7px;
    font-size: 13px; font-weight: 600; font-family: var(--sans);
    cursor: pointer; transition: all 0.15s; border: none;
  }
  .btn-primary { background: var(--pan-navy); color: #fff; }
  .btn-primary:hover { background: var(--pan-navy-l); }
  .btn-outline { background: #fff; color: var(--pan-navy); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg); border-color: var(--pan-navy); }
  .btn-orange { background: var(--pan-orange); color: #fff; }
  .btn-orange:hover { background: var(--pan-orange-l); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }

  /* trust bundle table */
  .trust-table { width: 100%; border-collapse: collapse; }
  .trust-table th {
    text-align: left; padding: 10px 16px;
    font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-2); background: #F7FAFD;
    border-bottom: 1px solid var(--border);
  }
  .trust-table td {
    padding: 13px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .trust-table tr:last-child td { border-bottom: none; }
  .trust-table tr:hover td { background: #F7FAFD; }
  .cert-subject { font-family: var(--mono); font-size: 12px; color: var(--text); }
  .cert-serial { font-family: var(--mono); font-size: 12px; color: var(--text-2); }
  .cert-actions { display: flex; gap: 8px; }

  /* modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,20,50,0.55);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal {
    background: var(--bg-card);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 720px;
    max-height: 90vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; font-family: var(--mono); }
  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text-2); font-size: 20px; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
    transition: all 0.1s;
  }
  .modal-close:hover { background: var(--bg); color: var(--text); }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: flex-end; gap: 10px;
    background: #F7FAFD;
  }

  /* pem box */
  .pem-box {
    background: #0D1F33;
    border-radius: 8px;
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: #8CB8E0;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
    max-height: 220px;
    overflow-y: auto;
    margin-top: 16px;
  }

  /* validity bar */
  .validity-bar { display: flex; flex-direction: column; gap: 4px; }
  .validity-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .validity-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .validity-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); }

  /* fingerprint */
  .fingerprint { font-family: var(--mono); font-size: 11px; color: var(--text-2); word-break: break-all; }

  /* empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--text-2); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-msg { font-size: 15px; font-weight: 600; }
  .empty-sub { font-size: 13px; margin-top: 6px; }

  /* refresh button */
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 7px;
    color: rgba(255,255,255,0.85);
    font-size: 12.5px; font-weight: 600; font-family: var(--sans);
    cursor: pointer; transition: all 0.15s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.2); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.8s linear infinite; }

  /* loading skeleton */
  @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
  .skeleton {
    background: linear-gradient(90deg, #e8edf3 25%, #f3f6f9 50%, #e8edf3 75%);
    background-size: 400px 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 4px;
  }

  /* fade in */
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }
  .fade-in { animation: fadeUp 0.3s ease both; }

  /* two col layout */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
</style>

// ─── Utilities ─────────────────────────────────────────────────────────────────

function formatDate(iso) {
  return new Date(iso).toLocaleString("en-US", {
    year: "numeric", month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", timeZoneName: "short"
  });
}

function unixToDate(unix) {
  return new Date(unix * 1000).toLocaleString("en-US", {
    year: "numeric", month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", timeZoneName: "short"
  });
}

function validityPercent(notBefore, notAfter) {
  const start = new Date(notBefore).getTime();
  const end = new Date(notAfter).getTime();
  const now = Date.now();
  return Math.max(0, Math.min(100, ((now - start) / (end - start)) * 100));
}

function timeRemaining(notAfter) {
  const ms = new Date(notAfter).getTime() - Date.now();
  if (ms < 0) return { label: "Expired", ok: false };
  const h = Math.floor(ms / 3600000);
  const d = Math.floor(h / 24);
  if (d > 1) return { label: `${d} days remaining`, ok: true };
  if (h > 1) return { label: `${h} hours remaining`, ok: h > 2 };
  return { label: `< 1 hour remaining`, ok: false };
}

function splitJWT(token) {
  const parts = token.split(".");
  return { header: parts[0], payload: parts[1], signature: parts[2] };
}

// ─── Copy Button ───────────────────────────────────────────────────────────────

function CopyBtn({ text, label = "Copy" }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <button className={`btn-copy${copied ? " copied" : ""}`} onClick={copy}>
      {copied ? (
        <><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 3L6 10.5 2.5 7 1 8.5l5 5 9-9z"/></svg> Copied</>
      ) : (
        <><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 4h8v1H4zm0 2h8v1H4zm0 2h6v1H4zM2 2v12h10v-2h2V2H2zm9 11H3V3h8v10zm2-2h-1V4h-1V2h2v9z"/></svg> {label}</>
      )}
    </button>
  );
}

  const { header, payload, signature } = splitJWT(data.token);

  const notBefore = new Date(claims.iat * 1000).toISOString();
  const notAfter  = new Date(claims.exp * 1000).toISOString();

  const pct = validityPercent(notBefore, notAfter);

          <CopyBtn text={cert.pem} label="Copy PEM" />
          <button className="btn btn-primary btn-sm" onClick={downloadPem}>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v-1H3v1z"/></svg>
            Download PEM
          </button>
          <button className="btn btn-outline btn-sm" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ─── Trust Bundles Tab ─────────────────────────────────────────────────────────

function TrustBundlesTab({ bundles }) {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState("");

  const filtered = bundles.filter(b =>
    b.subject.toLowerCase().includes(filter.toLowerCase()) ||
    b.trustDomain.toLowerCase().includes(filter.toLowerCase())
  );

  // group by trust domain
  const domains = [...new Set(filtered.map(b => b.trustDomain))];

  const downloadPem = (cert, e) => {
    e.stopPropagation();
    const blob = new Blob([cert.pem], {type:"application/x-pem-file"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${cert.trustDomain}-${cert.id}.pem`;
    a.click();
  };

  return (
    <div className="fade-in">
      <div className="section-header">
        <div>
          <div className="section-title">X.509 Trust Bundles</div>
          <div className="section-sub">{bundles.length} certificates across {[...new Set(bundles.map(b=>b.trustDomain))].length} trust domains</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input
            type="text"
            placeholder="Filter certificates…"
            value={filter}
            onChange={e => setFilter(e.target.value)}
            style={{
              padding:"7px 12px", border:"1px solid var(--border)",
              borderRadius:7, fontSize:13, fontFamily:"var(--sans)",
              width:220, color:"var(--text)", outline:"none",
              background:"var(--bg-card)"
            }}
          />
        </div>
      </div>

      {domains.map(domain => {
        const certs = filtered.filter(b => b.trustDomain === domain);
        return (
          <div key={domain} className="card" style={{marginBottom:20}}>
            <div className="card-header">
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span className="card-title">Trust Domain</span>
                <span style={{
                  fontFamily:"var(--mono)",fontSize:13,fontWeight:600,
                  color:"var(--pan-navy)",background:"rgba(0,58,110,0.08)",
                  padding:"2px 10px",borderRadius:5
                }}>{domain}</span>
                <span className="badge badge-blue">{certs.length} cert{certs.length !== 1 ? "s" : ""}</span>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table className="trust-table">
                <thead>
                  <tr>
                    <th>Subject</th>
                    <th>Serial Number</th>
                    <th>Key Algorithm</th>
                    <th>Valid Until</th>
                    <th>Status</th>
                    <th style={{textAlign:"right"}}>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {certs.map(cert => {
                    const rem = timeRemaining(cert.notAfter);
                    return (
                      <tr key={cert.id}>
                        <td>
                          <div className="cert-subject">{cert.subject.split(",")[0].replace("CN=","")}</div>
                          <div style={{fontSize:11,color:"var(--text-3)",marginTop:2}}>{cert.subject}</div>
                        </td>
                        <td><span className="cert-serial">{cert.serialNumber}</span></td>
                        <td><span className="badge badge-navy">{cert.keyAlgorithm}</span></td>
                        <td>
                          <div style={{fontSize:12.5}}>{formatDate(cert.notAfter)}</div>
                        </td>
                        <td>
                          <span className={`badge ${rem.ok ? "badge-green" : "badge-orange"}`}>
                            ● {rem.ok ? "Valid" : "Expiring"}
                          </span>
                        </td>
                        <td>
                          <div className="cert-actions" style={{justifyContent:"flex-end"}}>
                            <button className="btn btn-outline btn-sm" onClick={() => setSelected(cert)}>
                              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3C4 3 1 8 1 8s3 5 7 5 7-5 7-5-3-5-7-5zm0 8a3 3 0 110-6 3 3 0 010 6zm0-5a2 2 0 100 4 2 2 0 000-4z"/></svg>
                              Details
                            </button>
                            <button className="btn btn-primary btn-sm" onClick={e => downloadPem(cert, e)}>
                              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-5 2h10v-1H3v1z"/></svg>
                              PEM
                            </button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}

      {filtered.length === 0 && (
        <div className="empty">
          <div className="empty-icon">🔍</div>
          <div className="empty-msg">No certificates match your filter</div>
          <div className="empty-sub">Try a different search term</div>
        </div>
      )}

      {selected && <CertModal cert={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

// ─── PAN Logo SVG ──────────────────────────────────────────────────────────────

function PanLogo() {
  return (
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="8" fill="#FA4616"/>
      <path d="M8 26V10h7c1.8 0 3.2.5 4.2 1.5 1 1 1.5 2.3 1.5 3.9 0 1.6-.5 2.9-1.5 3.9-1 1-2.4 1.5-4.2 1.5h-3.5V26H8zm3.5-8.8h3.3c.8 0 1.4-.2 1.8-.7.4-.4.6-1 .6-1.6 0-.7-.2-1.2-.6-1.6-.4-.4-1-.7-1.8-.7h-3.3v4.6zM22 26V10h4.2L30 19.5 28 26h-2.5l-4-12v12H22z" fill="white"/>
    </svg>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState("jwt");
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setLoading(false), 900);
    return () => clearTimeout(t);
  }, []);

  const refresh = () => {
    setRefreshing(true);
    setLoading(true);
    setTimeout(() => { setRefreshing(false); setLoading(false); }, 1200);
  };

  const tabs = [
    {
      id: "jwt",
      label: "JWT-SVID",
      icon: <svg className="tab-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zM2 8a6 6 0 1112 0A6 6 0 012 8zm5-2h2v5H7V6zm0-2h2v1.5H7V4z"/></svg>
    },
    {
      id: "x509",
      label: "X.509-SVID",
      icon: <svg className="tab-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L2 4v4c0 3.5 2.5 6.5 6 7.4C11.5 14.5 14 11.5 14 8V4L8 1zm-1 9.4L4.6 8l1.1-1.1 1.3 1.3 3.3-3.3 1.1 1.1L7 10.4z"/></svg>
    },
    {
      id: "bundles",
      label: "Trust Bundles",
      icon: <svg className="tab-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v1H2zm0 3h12v1H2zm0 3h8v1H2zm0 3h6v1H2z"/></svg>
    }
  ];

  return (
    <div className="app">
      {/* Header */}
      <header className="header">
        <div className="header-logo">
          <img src="uploads/spiffeio-ar21.svg" alt="SPIFFE" />
        </div>
        <div className="header-divider"></div>
        <span className="header-title">Workload Identity</span>
        <div className="header-spacer"></div>
        <div className="header-status">
          <div className={`status-dot${loading ? " error" : ""}`}></div>
          <span>{loading ? "Fetching…" : "Workload API Connected"}</span>
        </div>
        <button className="refresh-btn" onClick={refresh} disabled={refreshing}>
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" className={refreshing ? "spinning" : ""}>
            <path d="M14 8A6 6 0 112.1 5H4.5L2 2.5 4.5 0H1v2.5A8 8 0 1014 8z"/>
          </svg>
          Refresh
        </button>
      </header>

      {/* Workload bar */}
      <div className="workload-bar">
        <span className="workload-label">SPIFFE ID</span>
        <span className="workload-sep">|</span>
        <span className="workload-id">spiffe://example.org/workload/backend-service</span>
        <span className="workload-sep">|</span>
        <span className="workload-label">Trust Domain</span>
        <span className="workload-sep">|</span>
        <span className="workload-id" style={{color:"rgba(255,255,255,0.6)"}}>example.org</span>
      </div>

      {/* Tabs */}
      <nav className="tabs-bar">
        {tabs.map(t => (
          <button
            key={t.id}
            className={`tab-btn${tab === t.id ? " active" : ""}`}
            onClick={() => setTab(t.id)}
          >
            {t.icon}
            {t.label}
          </button>
        ))}
      </nav>

      {/* Content */}
      <main className="main">
        {loading ? (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {[200,120,80,160].map((h,i) => (
              <div key={i} className="skeleton" style={{height:h,borderRadius:10}}></div>
            ))}
          </div>
        ) : (
          <>
            {tab === "jwt" && <JwtSvidTab data={MOCK_JWT_SVID} />}
            {tab === "x509" && <X509SvidTab data={MOCK_X509_SVID} />}
            {tab === "bundles" && <TrustBundlesTab bundles={MOCK_TRUST_BUNDLES} />}
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
